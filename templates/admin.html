<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

    <!-- Title -->
    <h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

    <!-- Alert -->
    {% if alert %}
    <div class="bg-red-500 text-white p-4 rounded mb-4">
        {{alert}}
    </div>
    {% endif %}

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">

        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-lg font-semibold">Eating</h2>
            <p class="text-2xl">{{eating}}</p>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-lg font-semibold">Not Eating</h2>
            <p class="text-2xl">{{not_eating}}</p>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-lg font-semibold">Avg Rating</h2>
            <p class="text-2xl">
                {{ avg_rating if avg_rating else 0 }}
            </p>
        </div>

    </div>

    <!-- Chart Section -->
    <div class="bg-white p-6 rounded shadow mb-6">
        <h2 class="text-xl font-bold mb-4">Meal Distribution</h2>
        <canvas id="mealChart"></canvas>
    </div>

    <!-- Feedback Section -->
    <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Student Feedback</h2>

        {% for f in feedbacks %}
        <div class="border-b py-2 {% if f[1] < 3 %}bg-red-100{% endif %}">
            <p><strong>{{f[0]}}</strong> ⭐ {{f[1]}}</p>
            <p class="text-gray-600">{{f[2]}}</p>
        </div>
        {% endfor %}

    </div>

    <!-- Chart Script -->
    <script>
        const ctx = document.getElementById('mealChart');

        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Eating', 'Not Eating'],
                datasets: [{
                    data: [{{ eating }}, {{ not_eating }}]
                }]
            }
        });
    </script>

</body>
</html>

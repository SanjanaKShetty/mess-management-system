<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-6 text-center">📊 Admin Dashboard</h1>

<!-- STATS -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <div class="bg-green-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">🍽 Eating</h2>
        <p class="text-3xl font-bold">{{ eating }}</p>
    </div>

    <div class="bg-red-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">❌ Not Eating</h2>
        <p class="text-3xl font-bold">{{ not_eating }}</p>
    </div>

    <div class="bg-blue-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">⭐ Avg Rating</h2>
        <p class="text-3xl font-bold">{{ avg_rating }}</p>
    </div>

</div>

<!-- CHART -->
<div class="bg-white p-6 rounded shadow mb-6">
    <h2 class="text-xl font-bold mb-4">Meal Distribution</h2>

    <!-- FIXED SIZE CONTAINER -->
    <div style="width: 300px; height: 300px; margin: auto;">
        <canvas id="mealChart"></canvas>
    </div>
</div>

<script>
const ctx = document.getElementById('mealChart');

const eating = {{ eating }};
const notEating = {{ not_eating }};

if (eating > 0 || notEating > 0) {
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Eating', 'Not Eating'],
            datasets: [{
                data: [eating, notEating],
                backgroundColor: ['#22c55e', '#ef4444']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}
</script>

<!-- FEEDBACK -->
<div class="bg-white p-6 rounded shadow mt-6">
    <h2 class="text-xl font-bold mb-4">Student Feedback</h2>

    {% for f in feedbacks %}
    <div class="border-b py-3 flex justify-between items-center">

        <div>
            <p class="font-semibold">{{f[0]}}</p>
            <p class="text-gray-600 text-sm">{{f[2]}}</p>
        </div>

        <div class="text-yellow-500 font-bold">
            ⭐ {{f[1]}}
        </div>

    </div>
    {% endfor %}
</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Eating', 'Not Eating'],
        datasets: [{
            data: [{{ eating }}, {{ not_eating }}],
            backgroundColor: ['#22c55e', '#ef4444']
        }]
    },
    options: {
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});
</script>

</body>
</html>

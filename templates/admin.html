<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-5xl mx-auto">

    <!-- Title -->
    <h1 class="text-3xl font-bold mb-6 text-center">
        📊 Admin Dashboard
    </h1>

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">

        <div class="bg-green-500 text-white p-5 rounded-xl shadow">
            <h2 class="text-lg">Eating</h2>
            <p class="text-3xl font-bold">{{ eating }}</p>
        </div>

        <div class="bg-red-500 text-white p-5 rounded-xl shadow">
            <h2 class="text-lg">Not Eating</h2>
            <p class="text-3xl font-bold">{{ not_eating }}</p>
        </div>

        <div class="bg-blue-500 text-white p-5 rounded-xl shadow">
            <h2 class="text-lg">Total</h2>
            <p class="text-3xl font-bold">{{ eating + not_eating }}</p>
        </div>

    </div>

    <!-- Chart -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h2 class="text-xl font-bold mb-4">Meal Distribution</h2>
        <canvas id="mealChart"></canvas>
    </div>

    <!-- Data Table -->
    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Student Responses</h2>

        <table class="w-full border">
            <tr class="bg-gray-200">
                <th class="p-2">Name</th>
                <th class="p-2">Status</th>
            </tr>

            {% for d in data %}
            <tr class="text-center border-t">
                <td class="p-2">{{ d[0] }}</td>
                <td class="p-2">
                    {% if d[1] == 'yes' %}
                        <span class="text-green-600 font-semibold">Eating</span>
                    {% else %}
                        <span class="text-red-600 font-semibold">Not Eating</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

<script>
const ctx = document.getElementById('mealChart');

const eating = {{ eating }};
const notEating = {{ not_eating }};

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Eating', 'Not Eating'],
        datasets: [{
            data: [eating, notEating],
            backgroundColor: ['#22c55e', '#ef4444']
        }]
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

<!-- STATS -->
<div class="grid grid-cols-3 gap-4 mb-6">

    <div class="bg-green-500 text-white p-4 rounded shadow">
        <h2>Eating</h2>
        <p class="text-2xl">{{ eating }}</p>
    </div>

    <div class="bg-red-500 text-white p-4 rounded shadow">
        <h2>Not Eating</h2>
        <p class="text-2xl">{{ not_eating }}</p>
    </div>

    <div class="bg-blue-500 text-white p-4 rounded shadow">
        <h2>Avg Rating</h2>
        <p class="text-2xl">{{ avg_rating }}</p>
    </div>

</div>

<!-- CHART -->
<div class="bg-white p-6 rounded shadow mb-6">
    <h2 class="text-xl mb-4">Meal Distribution</h2>
    <canvas id="chart"></canvas>
</div>

<!-- FEEDBACK -->
<div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl mb-4">Feedback</h2>

    {% for f in feedbacks %}
        <div class="border-b py-2">
            <p><strong>{{ f[0] }}</strong> ⭐ {{ f[1] }}</p>
            <p class="text-gray-600">{{ f[2] }}</p>
        </div>
    {% endfor %}

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Eating', 'Not Eating'],
        datasets: [{
            data: [{{ eating }}, {{ not_eating }}],
            backgroundColor: ['green', 'red']
        }]
    }
});
</script>

</body>
</html>

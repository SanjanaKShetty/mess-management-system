<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 p-6">

    <!-- Title -->
    <h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

    <!-- Alert -->
    {% if alert %}
    <div class="bg-red-500 text-white p-4 rounded mb-4">
        {{alert}}
    </div>
    {% endif %}

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-6 mb-6">

    <div class="bg-green-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">🍽 Eating</h2>
        <p class="text-3xl font-bold">{{eating}}</p>
    </div>

    <div class="bg-red-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">❌ Not Eating</h2>
        <p class="text-3xl font-bold">{{not_eating}}</p>
    </div>

    <div class="bg-blue-500 text-white p-6 rounded-xl shadow-lg">
        <h2 class="text-lg">⭐ Avg Rating</h2>
        <p class="text-3xl font-bold">{{ avg_rating }}</p>
    </div>

</div>

    <!-- Chart Section -->
    <<div class="bg-white p-6 rounded shadow mb-6">
    <h2 class="text-xl font-bold mb-4">Meal Distribution</h2>
    
    <div class="w-full flex justify-center">
        <canvas id="mealChart" style="max-width:400px; max-height:400px;"></canvas>
    </div>
</div>

   <script>
    const ctx = document.getElementById('mealChart');

    const eating = JSON.parse('{{ eating | tojson }}');
    const notEating = JSON.parse('{{ not_eating | tojson }}');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Eating', 'Not Eating'],
            datasets: [{
                data: [eating, notEating]
            }]
        }
    });
</script>
    

</body>
</html>

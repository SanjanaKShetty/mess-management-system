<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

    <h2 class="text-2xl font-bold mb-4">Welcome {{name}}</h2>

    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <h3 class="text-lg font-semibold">
            Total Students Eating Today: {{count}}
        </h3>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <form action="/submit" method="POST">
            <input type="hidden" name="name" value="{{name}}">

            <label class="block mb-2 font-semibold">Will you eat today?</label>

            <input type="radio" name="status" value="yes"> Yes
            <input type="radio" name="status" value="no" class="ml-4"> No

            <br><br>

            <button class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                <a href="/feedback_page/{{name}}">
    <button class="mt-4 bg-purple-500 text-white px-4 py-2 rounded">
        Give Feedback
    </button>
</a>
                Submit
            </button>
        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">Student Feedback</h2>

    {% if feedbacks %}
        {% for f in feedbacks %}
        <div class="border-b py-3 px-2 rounded mb-2 {% if f[1] < 3 %}bg-red-100{% else %}bg-gray-50{% endif %}">
            <p class="font-semibold">{{f[0]}} ⭐ {{f[1]}}</p>
            <p class="text-gray-600">{{f[2]}}</p>
        </div>
        {% endfor %}
    {% else %}
        <p class="text-gray-500">No feedback yet</p>
    {% endif %}
</div>

</body>
</html>

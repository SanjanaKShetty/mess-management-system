<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .star {
            cursor: pointer;
            font-size: 30px;
            color: gray;
        }
        .star.selected {
            color: gold;
        }
    </style>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center mb-6">
        ⭐ Give Feedback
    </h2>

    <form action="/submit_feedback" method="POST">

        <!-- Name -->
        <input type="text" name="name" placeholder="Your name"
            class="w-full p-3 border rounded mb-4" required>

        <!-- Stars -->
        <div class="text-center mb-4">
            <p class="mb-2 font-medium">Rate your experience:</p>

            <div id="stars" class="flex justify-center gap-2">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>

            <input type="hidden" name="rating" id="rating" required>
        </div>

        <!-- Comment -->
        <textarea name="comment" placeholder="Write feedback..."
            class="w-full p-3 border rounded mb-4"></textarea>

        <button class="w-full bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600">
            Submit Feedback
        </button>

    </form>

</div>

<script>
const stars = document.querySelectorAll('.star');
const ratingInput = document.getElementById('rating');

stars.forEach(star => {
    star.addEventListener('click', () => {
        const value = star.getAttribute('data-value');
        ratingInput.value = value;

        stars.forEach(s => s.classList.remove('selected'));

        for (let i = 0; i < value; i++) {
            stars[i].classList.add('selected');
        }
    });
});
</script>

</body>
</html>

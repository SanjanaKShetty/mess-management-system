<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

    <h2 class="text-2xl font-bold text-center mb-6">⭐ Feedback</h2>

    <form action="/submit_feedback" method="POST">

        <input type="text" name="name" placeholder="Your name"
            class="w-full p-2 border rounded mb-4" required>

        <p class="text-center mb-2">Rate:</p>

        <div class="flex justify-center gap-2 mb-4">
    <span onclick="setRating(1)">⭐</span>
    <span onclick="setRating(2)">⭐</span>
    <span onclick="setRating(3)">⭐</span>
    <span onclick="setRating(4)">⭐</span>
    <span onclick="setRating(5)">⭐</span>
</div>

<input type="hidden" name="rating" id="rating">

        <textarea name="comment" placeholder="Comment"
            class="w-full p-2 border rounded mb-4"></textarea>

        <button class="w-full bg-purple-500 text-white p-2 rounded">
            Submit
        </button>

    </form>

</div>

<script>
function setRating(val){
    document.getElementById("rating").value = val;
    console.log("Rating:", val);
}
</script>

</body>
</html>

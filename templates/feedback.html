<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">

    <h1 class="text-2xl font-bold mb-4">⭐ Feedback</h1>

    <form action="/submit_feedback" method="POST">

        <input type="text" name="name" placeholder="Your name"
            class="w-full p-2 border rounded mb-4" required>

        <p class="mb-2">Rate:</p>

        <!-- ⭐ CLICKABLE STARS -->
        <div class="flex justify-center gap-2 mb-4">

            <input type="radio" name="rating" value="1" id="star1" hidden>
            <label for="star1" class="text-2xl cursor-pointer">☆</label>

            <input type="radio" name="rating" value="2" id="star2" hidden>
            <label for="star2" class="text-2xl cursor-pointer">☆</label>

            <input type="radio" name="rating" value="3" id="star3" hidden>
            <label for="star3" class="text-2xl cursor-pointer">☆</label>

            <input type="radio" name="rating" value="4" id="star4" hidden>
            <label for="star4" class="text-2xl cursor-pointer">☆</label>

            <input type="radio" name="rating" value="5" id="star5" hidden>
            <label for="star5" class="text-2xl cursor-pointer">☆</label>

        </div>

        <textarea name="comment" placeholder="Your feedback"
            class="w-full p-2 border rounded mb-4"></textarea>

        <button class="bg-purple-500 text-white px-4 py-2 rounded w-full">
            Submit
        </button>

    </form>

</div>

<script>
    const stars = document.querySelectorAll("label");
    const radios = document.querySelectorAll("input[name='rating']");

    stars.forEach((star, index) => {
        star.addEventListener("click", () => {
            radios[index].checked = true;

            stars.forEach((s, i) => {
                s.textContent = i <= index ? "⭐" : "☆";
            });
        });
    });
</script>

</body>
</html>

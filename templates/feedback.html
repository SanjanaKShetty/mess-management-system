<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

    <h2 class="text-2xl font-bold text-center mb-6">⭐ Feedback</h2>

    <form action="/submit_feedback" method="POST">

        <input type="text" name="name" placeholder="Your name"
            class="w-full p-2 border rounded mb-4" required>

        <p class="text-center mb-2">Rate:</p>

        <!-- ⭐ STAR SYSTEM -->
        <div class="flex justify-center gap-2 mb-4 text-3xl">

            <span class="star" data-value="1">☆</span>
            <span class="star" data-value="2">☆</span>
            <span class="star" data-value="3">☆</span>
            <span class="star" data-value="4">☆</span>
            <span class="star" data-value="5">☆</span>

        </div>

        <input type="hidden" name="rating" id="rating" required>

        <textarea name="comment" placeholder="Comment"
            class="w-full p-2 border rounded mb-4"></textarea>

        <button class="w-full bg-purple-500 text-white p-2 rounded">
            Submit
        </button>

    </form>

</div>

<!-- ⭐ SCRIPT -->
<script>
const stars = document.querySelectorAll(".star");
const ratingInput = document.getElementById("rating");

stars.forEach(star => {
    star.addEventListener("click", () => {
        let value = star.getAttribute("data-value");
        ratingInput.value = value;

        stars.forEach(s => {
            if (s.getAttribute("data-value") <= value) {
                s.textContent = "⭐";
            } else {
                s.textContent = "☆";
            }
        });
    });
});
</script>

</body>
</html>

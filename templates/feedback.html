<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

    <h2 class="text-2xl font-bold mb-4 text-center">
        ⭐ Give Feedback
    </h2>

    <form action="/submit_feedback" method="POST">

        <!-- Name -->
        <input type="text" name="name" placeholder="Your name"
            class="w-full p-2 border rounded mb-4" required>

        <!-- Stars -->
        <div class="mb-4 text-center">
            <p class="mb-2">Rate your experience:</p>

            <div class="flex justify-center gap-2 text-2xl">

                <label><input type="radio" name="rating" value="1" required> ⭐</label>
                <label><input type="radio" name="rating" value="2"> ⭐⭐</label>
                <label><input type="radio" name="rating" value="3"> ⭐⭐⭐</label>
                <label><input type="radio" name="rating" value="4"> ⭐⭐⭐⭐</label>
                <label><input type="radio" name="rating" value="5"> ⭐⭐⭐⭐⭐</label>

            </div>
        </div>

        <!-- Comment -->
        <textarea name="comment" placeholder="Write your feedback..."
            class="w-full p-2 border rounded mb-4"></textarea>

        <!-- Button -->
        <button class="w-full bg-purple-500 text-white py-2 rounded hover:bg-purple-600">
            Submit Feedback
        </button>

    </form>

</div>

</body>
</html>
